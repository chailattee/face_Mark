<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Filter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }

    #container {
      position: relative;
      display: inline-block;
    }

    video {
      display: none;
    }

    canvas {
      display: block;
      border-radius: 12px;
      max-width: 100vw;
    }

    #controls {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #555;
    }

    button.active {
      background: #c00;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    #filter-name {
      margin-top: 8px;
      font-size: 16px;
      color: #fff;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="controls">
    <button id="btn-prev">← Prev Filter</button>
    <button id="btn-next">Next Filter →</button>
    <button id="btn-snap">📸 Snapshot (Space)</button>
    <button id="btn-rec">⏺ Record (V)</button>
  </div>
  <div id="filter-name">Loading...</div>
  <div id="status">Starting camera...</div>

  <script type="module" src="./web/app.js"></script>
</body>

</html>
